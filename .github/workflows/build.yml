name: Build NezuTweak.dylib (LiveContainer)

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]
  release:
    types: [created]

env:
  THEOS: ${{ github.workspace }}/theos

jobs:
  build:
    runs-on: macos-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      # ── ldid をインストール ────────────────────────────────────────
      - name: Install ldid
        run: brew install ldid

      # ── Theos + SDK をキャッシュ ───────────────────────────────────
      - name: Cache Theos
        id: cache-theos
        uses: actions/cache@v4
        with:
          path: ${{ github.workspace }}/theos
          key: theos-${{ runner.os }}-${{ hashFiles('.github/theos-rev') }}
          restore-keys: theos-${{ runner.os }}-

      # ── Theos 本体を clone (キャッシュミス時のみ) ─────────────────
      - name: Clone Theos
        if: steps.cache-theos.outputs.cache-hit != 'true'
        run: |
          git clone --recursive --depth 1 \
            https://github.com/theos/theos.git "$THEOS"

      # ── SDK を git clone で直接取得 ───────────────────────────────
      - name: Clone iOS SDKs
        if: steps.cache-theos.outputs.cache-hit != 'true'
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          git clone --depth 1 \
            https://x-access-token:${GH_TOKEN}@github.com/theos/sdks.git \
            /tmp/theos-sdks

          mkdir -p "$THEOS/sdks"

          if [ -d /tmp/theos-sdks/iPhoneOS16.5.sdk ]; then
            cp -R /tmp/theos-sdks/iPhoneOS16.5.sdk "$THEOS/sdks/"
          else
            LATEST=$(ls -d /tmp/theos-sdks/iPhoneOS*.sdk 2>/dev/null | sort -V | tail -1)
            [ -n "$LATEST" ] && cp -R "$LATEST" "$THEOS/sdks/"
          fi

          echo "=== installed SDKs ==="
          ls "$THEOS/sdks/"

      # ── ビルド ────────────────────────────────────────────────────
      - name: Build NezuTweak.dylib
        run: make -j$(sysctl -n hw.ncpu)

      # ── LC_ID_DYLIB を @loader_path に正規化 + dist/ へ収集 ───────
      # Theos は .theos/obj/debug/ に dylib を生成する
      # find の除外に ./dist を加えて「コピー先 → コピー元」の自己参照を防ぐ
      - name: Collect & fix dylib
        run: |
          DYLIB=$(find .theos -name "NezuTweak.dylib" 2>/dev/null | head -1)
          if [ -z "$DYLIB" ]; then
            echo "::error::NezuTweak.dylib not found in .theos/"; exit 1
          fi
          echo "Found: $DYLIB"

          install_name_tool -id "@loader_path/NezuTweak.dylib" "$DYLIB"
          echo "=== LC_ID_DYLIB ==="
          otool -D "$DYLIB"

          mkdir -p dist
          cp "$DYLIB" dist/NezuTweak.dylib

          echo "=== Mach-O info ==="
          otool -l dist/NezuTweak.dylib | grep -A2 "LC_ID_DYLIB"
          file dist/NezuTweak.dylib

      - name: Upload dylib artifact
        uses: actions/upload-artifact@v4
        with:
          name: NezuTweak-dylib
          path: dist/NezuTweak.dylib

      - name: Attach to Release
        if: github.event_name == 'release'
        uses: softprops/action-gh-release@v2
        with:
          files: dist/NezuTweak.dylib
